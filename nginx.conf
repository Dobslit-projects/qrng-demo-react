# Log detalhado — mostra upstream info
log_format detailed '$remote_addr - [$time_local] "$request" '
                    'status=$status bytes=$body_bytes_sent '
                    'upstream=$upstream_addr '
                    'upstream_status=$upstream_status '
                    'upstream_time=$upstream_response_time '
                    'request_time=$request_time';

server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout detailed;
    error_log /dev/stderr info;

    # SPA — redireciona rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API QRNG (Red Pitaya)
    location /api/ {
        proxy_pass http://189.126.105.45:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # Stream endpoint com timeout maior
    location /api/stream {
        proxy_pass http://189.126.105.45:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
        proxy_buffering off;
    }

    # Proxy para FPGA via SSH tunnel
    location /api-fpga/ {
        proxy_pass http://189.126.105.45:18002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # Stream da FPGA com timeout maior
    location /api-fpga/stream {
        proxy_pass http://189.126.105.45:18002/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 10s;
        proxy_buffering off;
    }
}
